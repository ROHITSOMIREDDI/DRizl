{% extends "base.html" %}
{% block title %}Password Required — Drizl{% endblock %}
{% block body %}
<div class="auth-page">
  <a href="/" class="auth-logo">drizl.</a>
  <div class="auth-card" style="text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🔒</div>
    <h1 class="auth-title">This link is protected</h1>
    <p class="auth-sub">Enter the password to continue</p>
    {% if invalid %}
    <div style="padding:10px;background:var(--red-bg);border:1px solid rgba(248,113,113,0.2);border-radius:8px;color:var(--red);font-size:13px;margin-bottom:14px">
      Incorrect password. Please try again.
    </div>
    {% endif %}
    <form method="POST" action="/{{ code }}">
      <div class="form-group" style="text-align:left">
        <label class="form-label">Password</label>
        <input class="input" type="password" name="password" autofocus placeholder="Enter password..." required/>
      </div>
      <button class="btn btn-primary" style="width:100%" type="submit">Unlock →</button>
    </form>
  </div>
</div>
{% endblock %}
