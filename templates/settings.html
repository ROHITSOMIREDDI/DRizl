{% extends "base.html" %}
{% block title %}Settings — Drizl{% endblock %}
{% block body %}
<div class="d-layout">
  {% include "partials/sidebar.html" %}
  <div class="d-main">
    <div class="d-topbar">
      <div class="d-topbar-title">Settings</div>
    </div>
    <div class="d-content" style="max-width:600px">
      <div class="card" style="margin-bottom:24px">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:16px">Account details</div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="input" value="{{ user.email }}" disabled style="color:var(--text3)"/>
        </div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="input" value="{{ user.username }}" disabled style="color:var(--text3)"/>
        </div>
      </div>
      
      <div class="card">
        <div style="font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--red);margin-bottom:8px">Danger Zone</div>
        <p style="color:var(--text3);font-size:13px;margin-bottom:16px">Once you delete your account, there is no going back. Please be certain.</p>
        <button class="btn btn-danger" onclick="alert('Account deletion requires contacting support in this demo.')">Delete Account</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
